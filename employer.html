<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhà Tuyển Dụng - Xác Thực QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style> 
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; } 
        .hero-section { background: #004e92; color: white; padding: 50px 0 90px; text-align: center; border-radius: 0 0 30px 30px; } 
        .main-card { margin-top: -60px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; border-top: 6px solid #198754; } 
        .qr-upload-box { border: 2px dashed #198754; padding: 40px 20px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; background: #f8f9fa; display: block; }
        .qr-upload-box:hover { background: #e9ecef; border-color: #146c43; transform: translateY(-2px); }
        input[type="file"] { display: none; }
        .status-verified { background: #198754; color: white; }
        .status-unverified { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h2 class="fw-bold text-uppercase">Cổng Xác Thực Nhà Tuyển Dụng</h2>
            <p class="opacity-75 mb-3">Hệ thống quét mã QR tự động qua Blockchain</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="main-card">
                    
                    <div id="searchScreen">
                        <label class="qr-upload-box w-100 shadow-sm">
                            <i class="fas fa-file-import fa-4x text-success mb-3"></i>
                            <h4 class="fw-bold text-success">Tải ảnh QR ứng viên cung cấp</h4>
                            <p class="text-muted mb-0 mt-2">Hệ thống sẽ tự động quét và đối chiếu dữ liệu gốc</p>
                            <input type="file" id="qrUpload" accept="image/*">
                        </label>
                        <div class="text-center mt-3 d-none" id="scanningLoader">
                            <div class="spinner-border text-success spinner-border-sm" role="status"></div> 
                            <span class="text-success fw-bold ms-2">Đang giải mã dữ liệu Blockchain...</span>
                        </div>
                    </div>

                    <input type="hidden" id="searchId">

                    <div id="resultArea" style="display: none;">
                        <div id="statusBox" class="p-4 rounded-3 text-center mb-4 shadow-sm">
                            <div id="statusIcon" class="display-4 mb-2"></div>
                            <h2 id="mainStatus" class="fw-bold mb-0"></h2>
                            <p id="subMessage" class="mb-0 small opacity-75"></p>
                        </div>
                        
                        <div id="detailBox" class="card bg-light border-0 shadow-sm">
                            <div class="card-body p-4">
                                <h6 class="text-uppercase text-muted fw-bold border-bottom pb-2 mb-3">Thông tin văn bằng:</h6>
                                <div class="row g-3">
                                    <div class="col-5 text-secondary">Họ và tên:</div> <div class="col-7 fw-bold text-primary" id="resName"></div>
                                    <div class="col-5 text-secondary">Ngành:</div> <div class="col-7 fw-bold" id="resMajor"></div>
                                    <div class="col-5 text-secondary">Xếp loại:</div> <div class="col-7 fw-bold" id="resClass"></div>
                                    <div class="col-5 text-secondary">Ngày cấp:</div> <div class="col-7 fw-bold" id="resDate"></div>
                                    <div class="col-5 text-secondary">Trạng thái:</div> <div class="col-7 fw-bold text-success"><i class="fas fa-shield-alt"></i> Đã xác minh</div>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button onclick="location.reload()" class="btn btn-outline-success rounded-pill px-4 fw-bold">
                                <i class="fas fa-sync-alt me-2"></i> Quét mã khác
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
    document.getElementById('qrUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('scanningLoader').classList.remove('d-none');
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = img.width; 
                canvas.height = img.height;
                context.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                document.getElementById('scanningLoader').classList.add('d-none');

                if (code) {
                    // 1. Làm sạch dữ liệu ID
                    const cleanId = code.data.trim();
                    document.getElementById('searchId').value = cleanId;
                    
                    // 2. Chạy kiểm tra
                    checkEmployerAuth();
                } else {
                    alert("Lỗi: Hình ảnh không chứa mã QR hợp lệ hoặc quá mờ!");
                    document.getElementById('qrUpload').value = "";
                }
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

async function checkEmployerAuth() {
    const targetId = document.getElementById('searchId').value;
    if (!targetId) return;

    document.getElementById('scanningLoader').classList.remove('d-none');

    const originalAlert = window.alert;
    window.alert = function() {}; 

    const success = await verifyDiploma();

    window.alert = originalAlert;

    // 3. Xử lý hiển thị kết quả trên giao diện 
    setTimeout(() => {
        document.getElementById('scanningLoader').classList.add('d-none');
        document.getElementById('searchScreen').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const mainStatus = document.getElementById('mainStatus');
        const subMessage = document.getElementById('subMessage');
        const detailBox = document.getElementById('detailBox');
        const name = document.getElementById('resName').innerText;

        if (success && name && name !== "" && name !== "N/A") {
            // TRƯỜNG HỢP HỢP LỆ (Xanh lá)
            statusBox.className = "p-4 rounded-3 text-center shadow-sm status-verified";
            statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
            mainStatus.innerText = "VERIFIED";
            subMessage.innerText = "Văn bằng hợp lệ - Dữ liệu khớp 100% với Blockchain.";
            detailBox.style.display = 'block';
        } else {
            // TRƯỜNG HỢP KHÔNG HỢP LỆ (Đỏ) 
            statusBox.className = "p-4 rounded-3 text-center shadow-sm status-unverified";
            statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
            mainStatus.innerText = "UNVERIFIED";
            subMessage.innerText = "Cảnh báo: ID không tồn tại hoặc văn bằng chưa được phê duyệt chính thức!";
            detailBox.style.display = 'none'; 
        }
    }, 800);
}

</script>
</body>
</html>
