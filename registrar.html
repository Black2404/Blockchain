<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Đào Tạo - Xác Thực Văn Bằng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: #920000; color: white; padding: 50px 0 100px; text-align: center; border-radius: 0 0 30px 30px; }
        .main-card { margin-top: -60px; background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #dc3545; }
        .pending-item { transition: 0.3s; border-left: 5px solid #ffc107; }
        .pending-item:hover { background: #fff8e1; transform: scale(1.02); }
        .loading-spinner { display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1 class="fw-bold text-uppercase"><i class="fas fa-user-shield me-2"></i> PHÒNG ĐÀO TẠO</h1>
            <p class="opacity-75 mb-0">Hệ thống phê duyệt và xác thực văn bằng lên Blockchain</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="main-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold text-dark mb-0">DANH SÁCH CHỜ XÁC NHẬN</h4>
                        <button onclick="loadPending()" class="btn btn-sm btn-outline-secondary rounded-pill">
                            <i class="fas fa-sync-alt me-1"></i> Làm mới
                        </button>
                    </div>

                    <div id="pendingList" class="list-group">
                        <div class="text-center p-5">
                            <div class="spinner-border text-danger mb-3" role="status"></div>
                            <p class="text-muted">Đang kết nối Blockchain...</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Tự động tải danh sách khi trang web sẵn sàng
        window.addEventListener('load', async () => {
            // Chờ một chút để app.js khởi tạo Web3 và Contract
            setTimeout(async () => {
                if (typeof contract !== 'undefined') {
                    await loadPending();
                } else {
                    document.getElementById("pendingList").innerHTML = 
                        "<div class='alert alert-danger'>Lỗi: Không thể kết nối Smart Contract.</div>";
                }
            }, 1000);
        });

        async function loadPending() {
            const listDiv = document.getElementById("pendingList");
            try {
                const ids = await contract.methods.getPendingDiplomas().call();
                
                if (ids.length === 0) {
                    listDiv.innerHTML = `
                        <div class="text-center p-5 bg-light rounded-4">
                            <p class="mb-0 fw-bold">Không có hồ sơ nào đang chờ duyệt.</p>
                        </div>`;
                    return;
                }

                listDiv.innerHTML = "";
                for (let id of ids) {
                    const data = await contract.methods.verifyDiploma(id).call();
                    listDiv.innerHTML += `
                        <div class="list-group-item pending-item d-flex justify-content-between align-items-center p-3 mb-3 bg-white shadow-sm rounded-3">
                            <div>
                                <h6 class="fw-bold mb-1">${data[0]}</h6>
                                <p class="small text-muted mb-0">
                                    <i class="fas fa-graduation-cap me-1"></i> ${data[1]} | 
                                    <i class="fas fa-id-badge me-1"></i> ID: <b>${id}</b>
                                </p>
                                <span class="badge bg-warning text-dark mt-2" style="font-size: 0.7rem;">Xếp loại: ${data[2]}</span>
                            </div>
                            <button onclick="approveDiploma(${id})" class="btn btn-danger rounded-pill px-4 fw-bold">
                                <i class="fas fa-signature me-1"></i> XÁC NHẬN
                            </button>
                        </div>`;
                }
            } catch (error) {
                console.error(error);
                listDiv.innerHTML = "<div class='alert alert-danger'>Lỗi khi lấy dữ liệu từ Blockchain.</div>";
            }
        }
    </script>
</body>
</html>
