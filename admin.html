<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - VAA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style> 
        body { background: #f0f2f5; font-family: sans-serif; } 
        .hero-section { background: #004e92; color: white; padding: 50px 0 100px; text-align: center; border-radius: 0 0 30px 30px; } 
        .main-card { margin-top: -60px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; border-top: 6px solid #0d6efd; } 
    </style>
</head>

<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="fw-bold text-uppercase"><i class="fas fa-university me-2"></i> Nhà Trường</h1>
            <div class="small mt-2 opacity-75">Ví đang kết nối: <span id="walletAddress">...</span></div>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="main-card">
                    <div id="inputForm">
                        <h4 class="mb-4 fw-bold text-center">ĐIỀN THÔNG TIN VĂN BẰNG</h4>
                        <div class="mb-3">
                        <label class="small fw-bold text-muted">HỌ VÀ TÊN SINH VIÊN</label>
                        <input type="text" id="nameInput" class="form-control rounded-pill">
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold text-muted">NGÀNH HỌC</label>
                            <select id="majorInput" class="form-select rounded-pill">
                                <option value="Quản lý hoạt động bay">Quản lý hoạt động bay</option>
                                <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                                <option value="Kỹ thuật hàng không">Kỹ thuật hàng không</option>
                                <option value="Quản trị kinh doanh">Quản trị kinh doanh</option>
                                <option value="Ngôn ngữ anh">Ngôn ngữ anh</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold text-muted">XẾP LOẠI</label>
                            <select id="classInput" class="form-select rounded-pill">
                                <option value="Xuất sắc">Xuất sắc</option>
                                <option value="Giỏi">Giỏi</option>
                                <option value="Khá">Khá</option>
                                <option value="Trung bình">Trung bình</option>
                            </select>
                        </div>

                        <button onclick="issueDiploma()" class="btn btn-primary w-100 rounded-pill py-3 fw-bold">GỬI YÊU CẦU CẤP BẰNG</button>
                    </div>

                    <div id="successArea" class="mt-4 p-4 bg-warning bg-opacity-10 border border-warning rounded-4 text-center" style="display: none;">
                        <h3 class="text-warning fw-bold"><i class="fas fa-clock"></i> CHỜ PHÊ DUYỆT</h3>
                        <p>ID Sinh viên: <b id="generatedID" class="fs-2 text-dark"></b></p>
                        <button onclick="location.reload()" class="btn btn-outline-dark rounded-pill">Cấp bằng tiếp</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
