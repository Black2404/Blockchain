<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sinh Viên - VAA Blockchain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #fdfcf0; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%); color: #fff; padding: 60px 0 100px; text-align: center; border-radius: 0 0 50px 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-card { margin-top: -80px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 25px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #f1c40f; }
        .qr-container { background: white; padding: 20px; border-radius: 20px; border: 2px solid #f1c40f; }
        .btn-warning-custom { background: #f39c12; color: white; transition: 0.3s; border: none; }
        .btn-warning-custom:hover { background: #e67e22; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="fw-bold text-uppercase"><i class="fas fa-user-graduate me-2"></i> Hồ Sơ Sinh Viên</h1>
            <p class="opacity-100 fw-medium">Tải mã QR định danh để gửi cho Nhà tuyển dụng</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="main-card">
                    <div id="searchScreen">
                        <label class="form-label small fw-bold text-muted text-uppercase">Mã số định danh (ID)</label>
                        <div class="input-group mb-4 shadow-sm">
                            <input type="number" id="searchId" class="form-control form-control-lg rounded-start-pill border-2" placeholder="Nhập ID...">
                            <button onclick="studentCheck()" class="btn btn-warning-custom rounded-end-pill px-4 fw-bold">TRA CỨU</button>
                        </div>
                    </div>

                    <div id="resultArea" style="display: none;">
                        <div id="statusBadge" class="badge mb-3 py-2 px-3 fs-6 rounded-pill"></div>
                        
                        <div class="info-box mb-4 bg-light p-3 rounded-4 border">
                            <div class="info-row"><span class="text-muted small">Họ tên:</span><b id="resName" class="text-dark"></b></div>
                            <div class="info-row"><span class="text-muted small">Ngành:</span><b id="resMajor" class="text-dark"></b></div>
                            <div class="info-row"><span class="text-muted small">Xếp loại:</span><b id="resClass" class="text-dark"></b></div>
                            <div class="info-row"><span class="text-muted small">Ngày cấp:</span><b id="resDate" class="text-dark"></b></div>
                            <div class="info-row"><span class="text-muted small">ID hệ thống:</span><b id="certIdDisplay" class="text-dark"></b></div>
                        </div>

                        <div id="qrSection" class="text-center" style="display: none;">
                            <p class="fw-bold text-muted small mb-2 text-uppercase">Mã QR xác thực Blockchain</p>
                            <div class="qr-container d-inline-block mb-3 bg-white shadow-sm">
                                <img id="qrCodeImage" src="" alt="QR Code" crossorigin="anonymous" style="width: 200px; height: 200px; image-rendering: pixelated;">
                            </div>
                            
                            <button onclick="downloadQR()" class="btn btn-dark w-100 rounded-pill py-3 fw-bold shadow">
                                <i class="fas fa-download me-2"></i> TẢI QR ĐỂ XÁC THỰC
                            </button>
                            
                            <button onclick="location.reload()" class="btn btn-link btn-sm mt-3 text-muted text-decoration-none">Tra cứu ID khác</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function studentCheck() {
            if (typeof verifyDiploma === "function") {
                // 1. Gọi hàm verifyDiploma từ app.js để lấy dữ liệu từ Blockchain
                await verifyDiploma();
                
                const resName = document.getElementById('resName').innerText;
                const resClass = document.getElementById('resClass').innerText;
                const searchId = document.getElementById('searchId').value;
                const statusBadge = document.getElementById('statusBadge');
                const qrSection = document.getElementById('qrSection');

                // Kiểm tra nếu tìm thấy dữ liệu 
                if (resName !== "" && resName !== "N/A") {
                    document.getElementById('searchScreen').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('certIdDisplay').innerText = searchId;
                    
                    if (statusBadge && statusBadge.innerText.includes("VERIFIED") && !statusBadge.innerText.includes("UNVERIFIED")) {
                        // TRƯỜNG HỢP: ĐÃ ĐƯỢC PHÊ DUYỆT
                        const id = searchId;
                        document.getElementById('qrCodeImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${id}&margin=10`;
                        qrSection.style.display = 'block'; // Hiện vùng QR
                    } else {
                        // TRƯỜNG HỢP: CHƯA ĐƯỢC DUYỆT (isValid = false)
                        qrSection.style.display = 'none'; // Ẩn vùng QR
                        // Hiển thị thông báo nhắc nhở
                        const infoBox = document.querySelector('.info-box');
                        const alertMsg = document.createElement('div');
                        alertMsg.className = "alert alert-warning mt-3 small fw-bold text-center";
                        alertMsg.innerHTML = "<i class='fas fa-clock me-2'></i> Bằng của bạn đang chờ Phòng Đào tạo phê duyệt. Mã QR sẽ xuất hiện sau khi hoàn tất.";
                        infoBox.appendChild(alertMsg);
                    }
                }
            }
        }
            // Tải QR
            async function downloadQR() {
                const img = document.getElementById("qrCodeImage");
                const id = document.getElementById("searchId").value;
                
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                
                // Thiết lập kích thước chuẩn cho QR
                canvas.width = 300;
                canvas.height = 300;
                
                // Vẽ ảnh trắng làm nền trước khi vẽ QR (giúp jsQR nhận diện vùng chứa tốt hơn)
                ctx.fillStyle = "#white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Vẽ QR code lên canvas
                ctx.drawImage(img, 0, 0, 300, 300);
                
                // Xuất file ảnh
                const link = document.createElement("a");
                link.download = `VAA_BLOCKCHAIN_QR_${id}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
    </script>
</body>
</html>
